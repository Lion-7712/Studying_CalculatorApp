<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>トイレットペーパー 単価計算</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --accent: #c8402a;
    --accent2: #e8a020;
    --text: #1a1a1a;
    --muted: #7a7060;
    --border: #d8d0c0;
    --roll: #e8dcc8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  header {
    background: var(--accent);
    color: white;
    padding: 16px 20px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 3px 0 #8a2010;
  }
  .roll-icon {
    width: 36px; height: 36px;
    background: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
  }
  header span {
    font-size: 11px;
    opacity: 0.85;
    font-weight: 300;
    display: block;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
  }

  main { padding: 16px; max-width: 480px; margin: 0 auto; }

  /* Scan card */
  .scan-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }

  .scan-header {
    background: var(--text);
    color: white;
    padding: 10px 16px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.r { background: #ff5f57; }
  .dot.y { background: #ffbd2e; }
  .dot.g { background: #28c840; }

  /* Camera area */
  #scanner-container {
    position: relative;
    width: 100%;
    background: #111;
    overflow: hidden;
    display: none;
  }
  #scanner-container video,
  #scanner-container canvas {
    width: 100% !important;
    height: auto !important;
    display: block;
  }
  .scan-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .scan-frame {
    width: 70%;
    height: 80px;
    border: 3px solid var(--accent2);
    border-radius: 6px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.45);
    position: relative;
  }
  .scan-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
    animation: scanline 1.8s ease-in-out infinite;
  }
  @keyframes scanline {
    0% { top: 0; opacity: 1; }
    80% { opacity: 1; }
    100% { top: calc(100% - 2px); opacity: 0.3; }
  }

  /* Barcode placeholder */
  .scan-placeholder {
    padding: 28px 20px;
    text-align: center;
  }
  .barcode-graphic {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 2px;
    height: 56px;
    margin-bottom: 12px;
  }
  .bar {
    background: var(--text);
    width: 3px;
    border-radius: 1px;
    opacity: 0.7;
  }
  .scan-placeholder p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* Buttons */
  .btn-scan {
    display: block;
    width: calc(100% - 32px);
    margin: 0 16px 16px;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 0 #8a2010;
  }
  .btn-scan:active { transform: translateY(2px); box-shadow: 0 2px 0 #8a2010; }
  .btn-scan.stop {
    background: var(--muted);
    box-shadow: 0 4px 0 #4a4030;
  }
  .btn-scan.stop:active { box-shadow: 0 2px 0 #4a4030; }

  /* Manual input */
  .manual-section {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .manual-section h3 {
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .input-group {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .input-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 700;
  }
  input[type="number"], input[type="text"], select {
    border: 2px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    color: var(--text);
    background: var(--bg);
    width: 100%;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .btn-calc {
    display: block;
    width: 100%;
    padding: 12px;
    background: var(--text);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-calc:active { opacity: 0.8; }

  /* Result card */
  .result-card {
    background: var(--surface);
    border: 2px solid var(--accent);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    display: none;
    animation: fadeUp 0.3s ease;
    box-shadow: 0 4px 0 var(--accent), 0 8px 24px rgba(200,64,42,0.15);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .result-product {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 4px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
  }
  .result-name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    line-height: 1.4;
  }

  .unit-price-big {
    text-align: center;
    padding: 16px;
    background: var(--accent);
    border-radius: 8px;
    color: white;
    margin-bottom: 12px;
  }
  .unit-price-label {
    font-size: 11px;
    opacity: 0.85;
    letter-spacing: 0.15em;
    font-family: 'Space Mono', monospace;
    margin-bottom: 4px;
  }
  .unit-price-value {
    font-family: 'Space Mono', monospace;
    font-size: 40px;
    font-weight: 700;
    line-height: 1;
  }
  .unit-price-unit {
    font-size: 14px;
    opacity: 0.85;
    margin-top: 2px;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .detail-item {
    background: var(--bg);
    border-radius: 6px;
    padding: 8px;
    text-align: center;
  }
  .detail-item .label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .detail-item .value { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; }

  .barcode-display {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    padding: 6px;
    background: var(--bg);
    border-radius: 4px;
    letter-spacing: 0.2em;
  }

  /* History */
  .history-section {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .history-header {
    padding: 10px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .history-header h3 {
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.1em;
    color: var(--muted);
  }
  .btn-clear {
    font-size: 11px;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .history-empty {
    padding: 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
  .history-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    transition: background 0.15s;
  }
  .history-item:last-child { border-bottom: none; }
  .history-item:hover { background: var(--bg); }
  .history-item .name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .history-item .sub { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .history-item .price {
    font-family: 'Space Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
  }

  /* Status messages */
  #status {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    padding: 8px;
    display: none;
  }
  #status.error { color: var(--accent); }
  #status.success { color: #2a8a4a; }

  /* Loading */
  .loading-dots::after {
    content: '';
    animation: dots 1.2s infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    33% { content: '.'; }
    66% { content: '..'; }
    100% { content: '...'; }
  }

  footer {
    text-align: center;
    padding: 16px;
    color: var(--muted);
    font-size: 10px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<header>
  <div class="roll-icon">🧻</div>
  <div>
    <h1>トイレットペーパー 単価計算</h1>
    <span>COST PER METER CALCULATOR</span>
  </div>
</header>

<main>
  <!-- Scanner Card -->
  <div class="scan-card">
    <div class="scan-header">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      &nbsp;BARCODE SCANNER
    </div>
    <div id="scanner-container">
      <div id="interactive" class="viewport"></div>
      <div class="scan-overlay">
        <div class="scan-frame">
          <div class="scan-line"></div>
        </div>
      </div>
    </div>
    <div class="scan-placeholder" id="scan-placeholder">
      <div class="barcode-graphic" id="barcode-anim"></div>
      <p>カメラでバーコードをスキャン<br>または下のフォームで手動入力</p>
    </div>
    <div id="status"></div>
  </div>
  <button class="btn-scan" id="btn-scan" onclick="toggleScan()">📷 カメラでスキャン</button>

  <!-- Manual Input -->
  <div class="manual-section">
    <h3>✏️ MANUAL INPUT</h3>
    <div class="input-group">
      <div class="input-row">
        <label>バーコード (任意)</label>
        <input type="text" id="barcode-input" placeholder="4901234567890" inputmode="numeric">
      </div>
      <div class="input-row">
        <label>価格 (円) *</label>
        <input type="number" id="price" placeholder="298" min="1">
      </div>
    </div>
    <div class="input-group">
      <div class="input-row">
        <label>ロール数 *</label>
        <input type="number" id="rolls" placeholder="12" min="1">
      </div>
      <div class="input-row">
        <label>1ロール (m) *</label>
        <input type="number" id="length" placeholder="55" min="1" step="0.5">
      </div>
    </div>
    <div class="input-group">
      <div class="input-row">
        <label>商品名</label>
        <input type="text" id="product-name" placeholder="例: スコッティ ダブル">
      </div>
      <div class="input-row">
        <label>タイプ</label>
        <select id="paper-type">
          <option value="シングル">シングル</option>
          <option value="ダブル" selected>ダブル</option>
          <option value="トリプル">トリプル</option>
        </select>
      </div>
    </div>
    <button class="btn-calc" onclick="calculate()">計算する →</button>
  </div>

  <!-- Result -->
  <div class="result-card" id="result-card">
    <div class="result-product" id="res-barcode">JAN: —</div>
    <div class="result-name" id="res-name">—</div>
    <div class="unit-price-big">
      <div class="unit-price-label">1m あたりの単価</div>
      <div class="unit-price-value" id="res-unit-price">—</div>
      <div class="unit-price-unit">円 / m</div>
    </div>
    <div class="detail-grid">
      <div class="detail-item">
        <div class="label">価格</div>
        <div class="value" id="res-price">—</div>
      </div>
      <div class="detail-item">
        <div class="label">総延長</div>
        <div class="value" id="res-total">—</div>
      </div>
      <div class="detail-item">
        <div class="label">タイプ</div>
        <div class="value" id="res-type">—</div>
      </div>
    </div>
    <div class="barcode-display" id="res-barcode-display">—</div>
  </div>

  <!-- History -->
  <div class="history-section">
    <div class="history-header">
      <h3>📋 HISTORY</h3>
      <button class="btn-clear" onclick="clearHistory()">クリア</button>
    </div>
    <div id="history-list">
      <div class="history-empty">まだ記録がありません</div>
    </div>
  </div>
</main>

<footer>バーコードはJANコード (EAN-13) に対応 · 価格は税込で入力してください</footer>

<script>
// === Barcode animation ===
(function() {
  const anim = document.getElementById('barcode-anim');
  const pattern = [3,2,4,2,3,5,2,4,3,2,4,3,2,5,3,2,4,3,5,2,3];
  pattern.forEach(h => {
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.height = (h * 8) + 'px';
    anim.appendChild(bar);
  });
})();

// === State ===
let scanning = false;
let history = JSON.parse(localStorage.getItem('tp_history') || '[]');
renderHistory();

// === Scanner ===
function toggleScan() {
  if (scanning) stopScan();
  else startScan();
}

function startScan() {
  const container = document.getElementById('scanner-container');
  const placeholder = document.getElementById('scan-placeholder');
  const btn = document.getElementById('btn-scan');

  container.style.display = 'block';
  placeholder.style.display = 'none';
  btn.textContent = '⏹ スキャン停止';
  btn.classList.add('stop');
  scanning = true;

  Quagga.init({
    inputStream: {
      type: 'LiveStream',
      target: document.querySelector('#interactive'),
      constraints: {
        facingMode: 'environment',
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    },
    decoder: {
      readers: ['ean_reader', 'ean_8_reader', 'code_128_reader']
    },
    locate: true,
    frequency: 5
  }, function(err) {
    if (err) {
      showStatus('カメラの起動に失敗しました: ' + err.message, 'error');
      stopScan();
      return;
    }
    Quagga.start();
  });

  Quagga.onDetected(function(result) {
    const code = result.codeResult.code;
    if (code) {
      stopScan();
      document.getElementById('barcode-input').value = code;
      showStatus('✅ スキャン成功: ' + code, 'success');
      fetchProductInfo(code);
    }
  });
}

function stopScan() {
  scanning = false;
  const container = document.getElementById('scanner-container');
  const placeholder = document.getElementById('scan-placeholder');
  const btn = document.getElementById('btn-scan');

  try { Quagga.stop(); } catch(e) {}
  container.style.display = 'none';
  placeholder.style.display = 'block';
  btn.textContent = '📷 カメラでスキャン';
  btn.classList.remove('stop');
}

// === Product info lookup (Open Food Facts / fallback) ===
async function fetchProductInfo(barcode) {
  showStatus('商品情報を検索中<span class="loading-dots"></span>', 'info');
  try {
    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
    const data = await res.json();
    if (data.status === 1) {
      const p = data.product;
      const name = p.product_name_ja || p.product_name || '';
      if (name) {
        document.getElementById('product-name').value = name;
        showStatus('商品名を取得しました', 'success');
      } else {
        showStatus('バーコードを読み取りました（商品名は手動入力）', 'success');
      }
    } else {
      showStatus('バーコードを読み取りました（商品名は手動入力）', 'success');
    }
  } catch(e) {
    showStatus('バーコードを読み取りました（商品名は手動入力）', 'success');
  }
  setTimeout(() => hideStatus(), 3000);
}

// === Calculate ===
function calculate() {
  const price = parseFloat(document.getElementById('price').value);
  const rolls = parseFloat(document.getElementById('rolls').value);
  const length = parseFloat(document.getElementById('length').value);
  const name = document.getElementById('product-name').value || '不明な商品';
  const type = document.getElementById('paper-type').value;
  const barcode = document.getElementById('barcode-input').value;

  if (!price || !rolls || !length) {
    showStatus('価格・ロール数・1ロールの長さを入力してください', 'error');
    setTimeout(hideStatus, 3000);
    return;
  }

  const totalLength = rolls * length;
  const unitPrice = price / totalLength;

  // Show result
  const card = document.getElementById('result-card');
  card.style.display = 'none';
  card.offsetHeight; // reflow
  card.style.display = 'block';

  document.getElementById('res-barcode').textContent = barcode ? `JAN: ${barcode}` : 'JAN: スキャンなし';
  document.getElementById('res-name').textContent = `${name}　${type}　${rolls}ロール`;
  document.getElementById('res-unit-price').textContent = unitPrice.toFixed(2);
  document.getElementById('res-price').textContent = `¥${price}`;
  document.getElementById('res-total').textContent = `${totalLength}m`;
  document.getElementById('res-type').textContent = type;
  document.getElementById('res-barcode-display').textContent =
    barcode ? barcode.split('').join(' ') : '— バーコードなし —';

  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // Save to history
  const entry = {
    id: Date.now(),
    barcode, name, price, rolls, length, totalLength, unitPrice, type,
    date: new Date().toLocaleDateString('ja-JP')
  };
  history.unshift(entry);
  if (history.length > 20) history.pop();
  localStorage.setItem('tp_history', JSON.stringify(history));
  renderHistory();
  hideStatus();
}

// === History ===
function renderHistory() {
  const list = document.getElementById('history-list');
  if (!history.length) {
    list.innerHTML = '<div class="history-empty">まだ記録がありません</div>';
    return;
  }
  list.innerHTML = history.map(h => `
    <div class="history-item" onclick="loadHistory(${h.id})">
      <div>
        <div class="name">${h.name} (${h.type})</div>
        <div class="sub">${h.rolls}R × ${h.length}m = ${h.totalLength}m　¥${h.price}　${h.date}</div>
      </div>
      <div class="price">${h.unitPrice.toFixed(2)}円/m</div>
    </div>
  `).join('');
}

function loadHistory(id) {
  const h = history.find(x => x.id === id);
  if (!h) return;
  document.getElementById('barcode-input').value = h.barcode || '';
  document.getElementById('price').value = h.price;
  document.getElementById('rolls').value = h.rolls;
  document.getElementById('length').value = h.length;
  document.getElementById('product-name').value = h.name;
  document.getElementById('paper-type').value = h.type;
  calculate();
}

function clearHistory() {
  if (!history.length) return;
  if (confirm('履歴をすべて削除しますか？')) {
    history = [];
    localStorage.setItem('tp_history', '[]');
    renderHistory();
    document.getElementById('result-card').style.display = 'none';
  }
}

// === Status ===
function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.innerHTML = msg;
  el.className = type || '';
  el.style.display = 'block';
}
function hideStatus() {
  document.getElementById('status').style.display = 'none';
}
</script>
</body>
</html>
