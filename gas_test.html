<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAS接続テスト</title>
<style>
  body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; padding: 16px; }
  h2 { color: #ffbd2e; margin-bottom: 16px; }
  button { background: #c8402a; color: white; border: none; border-radius: 4px; padding: 10px 20px; cursor: pointer; font-size: 14px; margin: 4px; }
  button.green { background: #2a8a4a; }
  pre { background: #222; padding: 12px; border-radius: 6px; margin-top: 12px; white-space: pre-wrap; word-break: break-all; font-size: 12px; }
  .ok  { color: #4ad48a; } .err { color: #ff6b6b; } .info { color: #ffbd2e; }
</style>
</head>
<body>
<h2>🔧 GAS接続テスト v2（GET統一版）</h2>
<button onclick="testGet()">① GETテスト（履歴読み込み）</button>
<button class="green" onclick="testWrite()">② 書き込みテスト（GETパラメータ）</button>
<pre id="log">ボタンを押してテストしてください</pre>
<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwk5NsOZtPdXiMq1i4K6_bo6uw99UU_f9nph4zqjcQioT9HatJSkumq4qCfDojthbBy/exec';
const TOKEN   = '017xvFU36Vs5YJ8sQqxX';

function log(msg, cls) {
  document.getElementById('log').innerHTML += `<span class="${cls||''}">${msg}</span>\n`;
}
function clear() { document.getElementById('log').innerHTML = ''; }

async function testGet() {
  clear();
  log('=== GET（読み込み）テスト開始 ===', 'info');
  try {
    const url = `${GAS_URL}?token=${encodeURIComponent(TOKEN)}&action=read`;
    log('URL: ' + url);
    const res = await fetch(url, { mode: 'cors' });
    log(`HTTP Status: ${res.status}`, res.ok ? 'ok' : 'err');
    const text = await res.text();
    log('レスポンス: ' + text.substring(0, 300));
    const data = JSON.parse(text);
    log('result: ' + data.result, data.result === 'ok' ? 'ok' : 'err');
    if(data.history !== undefined) log(`履歴件数: ${data.history.length}件`, 'ok');
    if(data.result === 'unauthorized') log('❌ トークン認証失敗', 'err');
  } catch(err) {
    log('❌ エラー: ' + err.message, 'err');
  }
}

async function testWrite() {
  clear();
  log('=== GET（書き込み）テスト開始 ===', 'info');
  try {
    const params = new URLSearchParams({
      token: TOKEN, action: 'write',
      date: new Date().toLocaleDateString('ja-JP'),
      store: 'テスト店舗', name: 'テスト商品', type: 'ダブル',
      barcode: '0000000000000', price: 100, rolls: 12,
      length: 27.5, totalLength: 330, unitPrice: '0.30'
    });
    const url = `${GAS_URL}?${params}`;
    log('URL: ' + url.substring(0, 150) + '...');
    const res = await fetch(url, { mode: 'cors' });
    log(`HTTP Status: ${res.status}`, res.ok ? 'ok' : 'err');
    const text = await res.text();
    log('レスポンス: ' + text);
    const data = JSON.parse(text);
    log('result: ' + data.result, data.result === 'ok' ? 'ok' : 'err');
    if(data.result === 'ok') log('✅ スプレッドシートへの書き込み成功！', 'ok');
  } catch(err) {
    log('❌ エラー: ' + err.message, 'err');
  }
}
</script>
</body>
</html>
