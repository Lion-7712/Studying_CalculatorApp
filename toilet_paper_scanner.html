<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>トイレットペーパー 単価計算</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --accent: #c8402a;
    --accent2: #e8a020;
    --text: #1a1a1a;
    --muted: #7a7060;
    --border: #d8d0c0;
    --green: #2a8a4a;
    --green-bg: #eaf5ee;
    --off-color: #1a7a3a;
    --off-bg: #e8f5ee;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  header {
    background: var(--accent); color: white;
    padding: 16px 20px 14px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 3px 0 #8a2010;
  }
  .roll-icon {
    width: 36px; height: 36px; background: white; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
  }
  header h1 { font-size: 15px; font-weight: 700; line-height: 1.3; }
  header span { font-size: 11px; opacity: 0.85; font-weight: 300; display: block; font-family: 'Space Mono', monospace; letter-spacing: 0.05em; }

  main { padding: 16px; max-width: 480px; margin: 0 auto; }

  /* ── Scan card ── */
  .scan-card {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 12px; overflow: hidden; margin-bottom: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .scan-header {
    background: var(--text); color: white; padding: 10px 16px;
    font-size: 12px; font-family: 'Space Mono', monospace; letter-spacing: 0.1em;
    display: flex; align-items: center; gap: 8px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.r { background: #ff5f57; } .dot.y { background: #ffbd2e; } .dot.g { background: #28c840; }

  #scanner-container {
    position: relative;
    width: 100%;
    /* 正方形に固定 */
    aspect-ratio: 1 / 1;
    background: #111;
    overflow: hidden;
    display: none;
  }
  #scanner-container video,
  #scanner-container canvas {
    /* カメラ映像を正方形コンテナにトリミング表示 */
    position: absolute !important;
    top: 50% !important;
    left: 50% !important;
    transform: translate(-50%, -50%) !important;
    width: auto !important;
    height: 100% !important;
    min-width: 100% !important;
    min-height: 100% !important;
    object-fit: cover !important;
    display: block !important;
  }
  .scan-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    z-index: 10;
  }
  .scan-frame {
    width: 72%; height: 90px;
    border: 3px solid var(--accent2);
    border-radius: 6px;
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.50);
    position: relative;
  }
  .scan-line { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--accent2), transparent); animation: scanline 1.8s ease-in-out infinite; }
  @keyframes scanline { 0% { top: 0; opacity: 1; } 80% { opacity: 1; } 100% { top: calc(100% - 2px); opacity: 0.3; } }

  .scan-placeholder { padding: 28px 20px; text-align: center; }
  .barcode-graphic { display: flex; align-items: flex-end; justify-content: center; gap: 2px; height: 56px; margin-bottom: 12px; }
  .bar { background: var(--text); width: 3px; border-radius: 1px; opacity: 0.7; }
  .scan-placeholder p { font-size: 13px; color: var(--muted); line-height: 1.5; }

  /* ── Status ── */
  #status {
    margin: 0 12px 12px; padding: 10px 12px; border-radius: 8px;
    font-size: 13px; display: none; line-height: 1.6; animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  #status.error   { background: #fdecea; color: var(--accent);      border: 1px solid #f5c0b8; }
  #status.success { background: var(--green-bg); color: var(--green); border: 1px solid #b8dfc4; }
  #status.info    { background: #fef8ec; color: #7a5010;            border: 1px solid #f0d890; }
  #status.off     { background: var(--off-bg); color: var(--off-color); border: 1px solid #90d4a8; }

  .off-badge   { display: inline-flex; align-items: center; gap: 3px; background: var(--off-bg); color: var(--off-color); border: 1px solid #90d4a8; border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
  .db-badge    { display: inline-flex; align-items: center; gap: 3px; background: var(--green-bg); color: var(--green);         border: 1px solid #b8dfc4; border-radius: 20px; padding: 2px 8px; font-size: 11px; font-weight: 700; }

  /* ── Buttons ── */
  .btn-scan {
    display: block; width: calc(100% - 32px); margin: 0 16px 16px;
    padding: 14px; background: var(--accent); color: white;
    border: none; border-radius: 8px; font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s; box-shadow: 0 4px 0 #8a2010;
  }
  .btn-scan:active { transform: translateY(2px); box-shadow: 0 2px 0 #8a2010; }
  .btn-scan.stop { background: var(--muted); box-shadow: 0 4px 0 #4a4030; }

  /* ── Form ── */
  .manual-section { background: var(--surface); border: 2px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .section-title { font-size: 12px; font-family: 'Space Mono', monospace; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .input-row { display: flex; flex-direction: column; gap: 4px; }
  label { font-size: 11px; color: var(--muted); font-weight: 700; }
  .field-wrap { position: relative; }
  .field-src { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 700; pointer-events: none; padding: 1px 5px; border-radius: 4px; }
  .field-src.off   { background: var(--off-bg);   color: var(--off-color); }
  .field-src.db    { background: var(--green-bg);  color: var(--green); }

  input[type="number"], input[type="text"], select {
    border: 2px solid var(--border); border-radius: 6px; padding: 8px 10px;
    font-family: 'Space Mono', monospace; font-size: 14px; color: var(--text); background: var(--bg);
    width: 100%; transition: border-color 0.2s, background 0.2s; -webkit-appearance: none;
  }
  input.filled-off, select.filled-off { border-color: var(--off-color); background: var(--off-bg); }
  input.filled-db,    select.filled-db    { border-color: var(--green);       background: var(--green-bg); }
  input:focus, select:focus { outline: none; border-color: var(--accent); }

  .btn-calc { display: block; width: 100%; padding: 12px; background: var(--text); color: white; border: none; border-radius: 8px; font-family: 'Noto Sans JP', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
  .btn-calc:active { opacity: 0.8; }
  .btn-save-db { display: none; width: 100%; padding: 10px; background: var(--green-bg); color: var(--green); border: 2px solid #b8dfc4; border-radius: 8px; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: opacity 0.15s; }
  .btn-save-db:active { opacity: 0.8; }

  /* ── Result ── */
  .result-card {
    background: var(--surface); border: 2px solid var(--accent); border-radius: 12px; padding: 20px;
    margin-bottom: 16px; display: none; animation: fadeUp 0.3s ease;
    box-shadow: 0 4px 0 var(--accent), 0 8px 24px rgba(200,64,42,0.15);
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .result-product { font-size: 13px; color: var(--muted); margin-bottom: 4px; font-family: 'Space Mono', monospace; }
  .result-name { font-size: 16px; font-weight: 700; margin-bottom: 16px; line-height: 1.4; }
  .unit-price-big { text-align: center; padding: 16px; background: var(--accent); border-radius: 8px; color: white; margin-bottom: 12px; }
  .unit-price-label { font-size: 11px; opacity: 0.85; letter-spacing: 0.15em; font-family: 'Space Mono', monospace; margin-bottom: 4px; }
  .unit-price-value { font-family: 'Space Mono', monospace; font-size: 40px; font-weight: 700; line-height: 1; }
  .unit-price-unit { font-size: 14px; opacity: 0.85; margin-top: 2px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .detail-item { background: var(--bg); border-radius: 6px; padding: 8px; text-align: center; }
  .detail-item .label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .detail-item .value { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; }
  .barcode-display { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); text-align: center; padding: 6px; background: var(--bg); border-radius: 4px; letter-spacing: 0.2em; }

  /* ── History ── */
  .history-section { background: var(--surface); border: 2px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
  .history-header { padding: 10px 16px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .history-header h3 { font-size: 12px; font-family: 'Space Mono', monospace; letter-spacing: 0.1em; color: var(--muted); }
  .btn-clear { font-size: 11px; color: var(--accent); background: none; border: none; cursor: pointer; }
  .history-empty { padding: 20px; text-align: center; color: var(--muted); font-size: 13px; }
  .history-item { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.15s; }
  .history-item:last-child { border-bottom: none; }
  .history-item:hover { background: var(--bg); }
  .history-item .name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .history-item .sub { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
  .history-item .price { font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700; color: var(--accent); white-space: nowrap; }

  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 4px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer { text-align: center; padding: 16px; color: var(--muted); font-size: 10px; font-family: 'Space Mono', monospace; letter-spacing: 0.05em; }
</style>
</head>
<body>

<header>
  <div class="roll-icon">🧻</div>
  <div>
    <h1>トイレットペーパー 単価計算</h1>
    <span>COST PER METER CALCULATOR v4</span>
  </div>
</header>

<main>
  <div class="scan-card">
    <div class="scan-header">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      &nbsp;BARCODE SCANNER
    </div>
    <div id="scanner-container">
      <div id="interactive" class="viewport"></div>
      <div class="scan-overlay"><div class="scan-frame"><div class="scan-line"></div></div></div>
    </div>
    <div class="scan-placeholder" id="scan-placeholder">
      <div class="barcode-graphic" id="barcode-anim"></div>
      <p>カメラでバーコードをスキャン<br>または下のフォームで手動入力</p>
    </div>
    <div id="status"></div>
  </div>
  <button class="btn-scan" id="btn-scan" onclick="toggleScan()">📷 カメラでスキャン</button>

  <div class="manual-section">
    <div class="section-title">
      <span>✏️ PRODUCT INFO</span>
      <span id="fill-source"></span>
    </div>
    <div class="input-group">
      <div class="input-row">
        <label>バーコード (任意)</label>
        <input type="text" id="barcode-input" placeholder="4901234567890" inputmode="numeric" onblur="onBarcodeManualInput()" onkeydown="if(event.key==='Enter'){this.blur();}">
      </div>
      <div class="input-row">
        <label>価格 (円) *</label>
        <input type="number" id="price" placeholder="298" min="1">
      </div>
    </div>
    <div class="input-group">
      <div class="input-row">
        <label>商品名</label>
        <div class="field-wrap">
          <input type="text" id="product-name" placeholder="例: スコッティ">
          <span class="field-src" id="src-name"></span>
        </div>
      </div>
      <div class="input-row">
        <label>タイプ</label>
        <div class="field-wrap">
          <select id="paper-type">
            <option value="シングル">シングル</option>
            <option value="ダブル" selected>ダブル</option>
            <option value="トリプル">トリプル</option>
          </select>
          <span class="field-src" id="src-type"></span>
        </div>
      </div>
    </div>
    <div class="input-group">
      <div class="input-row">
        <label>ロール数 *</label>
        <div class="field-wrap">
          <input type="number" id="rolls" placeholder="12" min="1">
          <span class="field-src" id="src-rolls"></span>
        </div>
      </div>
      <div class="input-row">
        <label>1ロール (m) *</label>
        <div class="field-wrap">
          <input type="number" id="length" placeholder="55" min="1" step="0.5">
          <span class="field-src" id="src-length"></span>
        </div>
      </div>
    </div>
    <button class="btn-calc" onclick="calculate()">計算する →</button>
    <button class="btn-save-db" id="btn-save-db" onclick="saveToDb()">💾 この商品情報を保存する（次回から自動入力）</button>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-product" id="res-barcode">JAN: —</div>
    <div class="result-name" id="res-name">—</div>
    <div class="unit-price-big">
      <div class="unit-price-label">1m あたりの単価</div>
      <div class="unit-price-value" id="res-unit-price">—</div>
      <div class="unit-price-unit">円 / m</div>
    </div>
    <div class="detail-grid">
      <div class="detail-item"><div class="label">価格</div><div class="value" id="res-price">—</div></div>
      <div class="detail-item"><div class="label">総延長</div><div class="value" id="res-total">—</div></div>
      <div class="detail-item"><div class="label">タイプ</div><div class="value" id="res-type">—</div></div>
    </div>
    <div class="barcode-display" id="res-barcode-display">—</div>
  </div>

  <div class="history-section">
    <div class="history-header">
      <h3>📋 HISTORY</h3>
      <button class="btn-clear" onclick="clearHistory()">クリア</button>
    </div>
    <div id="history-list"><div class="history-empty">まだ記録がありません</div></div>
  </div>
</main>

<footer>Open Food Facts API powered · バーコードはJANコード (EAN-13) に対応 · 価格は税込で入力してください</footer>

<script>
// ============================================================
// Open Food Facts API (無料・CORS対応・登録不要)

// ============================================================
// State
// ============================================================
let scanning = false;
let history = [];
let productDb = {};

try { history    = JSON.parse(localStorage.getItem('tp_history')    || '[]'); } catch(e){}
try { productDb  = JSON.parse(localStorage.getItem('tp_product_db') || '{}'); } catch(e){}

renderHistory();

// Barcode animation
(function(){
  const anim = document.getElementById('barcode-anim');
  [3,2,4,2,3,5,2,4,3,2,4,3,2,5,3,2,4,3,5,2,3].forEach(h => {
    const b = document.createElement('div'); b.className='bar'; b.style.height=(h*8)+'px'; anim.appendChild(b);
  });
})();

// ============================================================
// Scanner
// ============================================================
function toggleScan(){ scanning ? stopScan() : startScan(); }

function startScan(){
  document.getElementById('scanner-container').style.display='block';
  document.getElementById('scan-placeholder').style.display='none';
  const btn=document.getElementById('btn-scan');
  btn.textContent='⏹ スキャン停止'; btn.classList.add('stop');
  scanning=true;

  Quagga.init({
    inputStream:{ type:'LiveStream', target:document.querySelector('#interactive'),
        constraints:{ facingMode:'environment', width:{ideal:1080}, height:{ideal:1080}, aspectRatio:{ideal:1} } },
    decoder:{ readers:['ean_reader','ean_8_reader','code_128_reader'] },
    locate:true, frequency:5
  }, err=>{
    if(err){ showStatus('カメラの起動に失敗: '+err.message,'error'); stopScan(); return; }
    Quagga.start();
  });

  Quagga.onDetected(result=>{
    const code=result.codeResult.code;
    if(code){ stopScan(); document.getElementById('barcode-input').value=code; onBarcodeScanned(code); }
  });
}

function stopScan(){
  scanning=false; try{ Quagga.stop(); }catch(e){}
  document.getElementById('scanner-container').style.display='none';
  document.getElementById('scan-placeholder').style.display='block';
  const btn=document.getElementById('btn-scan');
  btn.textContent='📷 カメラでスキャン'; btn.classList.remove('stop');
}

// ============================================================
// Manual barcode input handler
// ============================================================
function onBarcodeManualInput(){
  const barcode = document.getElementById('barcode-input').value.trim();
  if(barcode.length >= 8 && /^\d+$/.test(barcode)){
    const alreadyFilled = document.getElementById('product-name').value.trim() !== '';
    if(!alreadyFilled) onBarcodeScanned(barcode);
  }
}

// ============================================================
// Autofill pipeline
// ============================================================
async function onBarcodeScanned(barcode){
  clearFillMarkers();
  // Priority 1: local DB
  if(productDb[barcode]){ fillFromDb(barcode); return; }
  // Priority 2: Open Food Facts API
  await fillFromOFF(barcode);
}

function fillFromDb(barcode){
  const p=productDb[barcode];
  setField('product-name', p.name,   'db');
  setField('rolls',        p.rolls,  'db');
  setField('length',       p.length, 'db');
  setSelectField('paper-type', p.type, 'db');
  document.getElementById('fill-source').innerHTML='<span class="db-badge">📦 ローカルDB</span>';
  document.getElementById('btn-save-db').style.display='none';
  showStatus('✅ 保存済み情報を自動入力しました <span class="db-badge">📦 ローカルDB</span>','success');
  setTimeout(hideStatus,4000);
  setTimeout(()=>document.getElementById('price').focus(),300);
}

async function fillFromOFF(barcode){
  showStatus('<span class="spinner"></span> 商品情報を検索中...','off');

  try{
    // Open Food Facts API - CORS対応・完全無料
    const res = await fetch(`https://world.openfoodfacts.net/api/v2/product/${encodeURIComponent(barcode)}.json?fields=product_name,product_name_ja,brands,quantity,packaging,labels,categories`, {
      headers:{
        'Authorization': 'Basic ' + btoa('off:off'),
        'User-Agent': 'ToiletPaperPriceCalc/1.0'
      }
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();

    if(data.status !== 1 || !data.product){
      showStatus('❓ データベースに未登録の商品です。手動で入力して「保存」すると次回から自動入力されます。','info');
      document.getElementById('btn-save-db').style.display='block';
      setTimeout(()=>document.getElementById('product-name').focus(),300);
      return;
    }

    const p = data.product;
    // 商品名（日本語優先）
    let name = p.product_name_ja || p.product_name || p.brands || '';
    name = name.replace(/【[^】]*】/g,'').replace(/[\r\n]/g,' ').trim().substring(0,30);

    // quantity / packaging / labels / categories を結合してトイレットペーパー情報を解析
    const combined = [
      p.quantity||'', p.packaging||'', p.labels||'', p.categories||'', name
    ].join(' ');

    let rolls=0, length=0, type='ダブル';

    // ロール数
    const rm = combined.match(/(\d{1,3})\s*(?:ロール|rolls?|個入り?|個パック|本入り?)/i);
    if(rm) rolls = parseInt(rm[1]);

    // 長さ（mまたはメートル）
    const lm = combined.match(/(\d{1,3}(?:[.,]\d{1,2})?)\s*(?:m(?!g|l|oz)|ｍ|メートル)/i);
    if(lm) length = parseFloat(lm[1].replace(',','.'));

    // タイプ
    if(/トリプル|triple|3.?ply/i.test(combined))       type='トリプル';
    else if(/シングル|single|1.?ply/i.test(combined))  type='シングル';
    else if(/ダブル|double|2.?ply/i.test(combined))    type='ダブル';

    if(!name){
      showStatus('❓ 商品名を取得できませんでした。手動で入力して保存してください。','info');
      document.getElementById('btn-save-db').style.display='block';
      setTimeout(()=>document.getElementById('product-name').focus(),300);
      return;
    }

    setField('product-name', name, 'off');
    setSelectField('paper-type', type, 'off');

    let partial = false;
    if(rolls>0){ setField('rolls', String(rolls), 'off'); }
    else { setField('rolls','',null); partial=true; }
    if(length>0){ setField('length', String(length), 'off'); }
    else { setField('length','',null); partial=true; }

    if(partial){
      showStatus(`✅ 商品名を自動入力しました。ロール数・長さを入力して保存してください。 <span class="off-badge">🌍 Open Food Facts</span>`,'off');
    } else {
      showStatus(`✅ 商品情報を自動入力しました <span class="off-badge">🌍 Open Food Facts</span>`,'off');
    }
    document.getElementById('fill-source').innerHTML='<span class="off-badge">🌍 Open Food Facts</span>';
    document.getElementById('btn-save-db').style.display='block';

    if(partial){
      setTimeout(()=>document.getElementById(rolls>0?'length':'rolls').focus(),300);
    } else {
      setTimeout(()=>document.getElementById('price').focus(),300);
    }

  } catch(e){
    console.error('OFF API error:', e);
    showStatus('⚠️ 商品情報の取得に失敗しました。手動で入力して「保存」すると次回から自動入力されます。','error');
    document.getElementById('btn-save-db').style.display='block';
    setTimeout(()=>document.getElementById('product-name').focus(),300);
  }
}

// ============================================================
// Field helpers
// ============================================================
function setField(id,value,source){
  const el=document.getElementById(id);
  el.value=value; el.className=source?'filled-'+source:'';
  const key=id==='product-name'?'name':id;
  const src=document.getElementById('src-'+key);
  if(src){ src.textContent=source==='off'?'O':source==='db'?'DB':''; src.className='field-src '+(source||''); }
}
function setSelectField(id,value,source){
  const el=document.getElementById(id);
  el.value=value?.includes('トリプル')?'トリプル':value?.includes('シングル')?'シングル':'ダブル';
  el.className=source?'filled-'+source:'';
  const src=document.getElementById('src-type');
  if(src){ src.textContent=source==='off'?'O':source==='db'?'DB':''; src.className='field-src '+(source||''); }
}
function clearFillMarkers(){
  ['product-name','rolls','length'].forEach(id=>setField(id,'',null));
  setSelectField('paper-type','ダブル',null);
  document.getElementById('fill-source').innerHTML='';
  document.getElementById('btn-save-db').style.display='none';
}

// ============================================================
// Save to local DB
// ============================================================
function saveToDb(){
  const barcode=document.getElementById('barcode-input').value.trim();
  const name=document.getElementById('product-name').value.trim();
  const rolls=parseFloat(document.getElementById('rolls').value);
  const length=parseFloat(document.getElementById('length').value);
  const type=document.getElementById('paper-type').value;
  if(!barcode){ showStatus('バーコードを入力してください','error'); return; }
  if(!name||!rolls||!length){ showStatus('商品名・ロール数・長さをすべて入力してください','error'); return; }
  productDb[barcode]={name,rolls,length,type};
  localStorage.setItem('tp_product_db',JSON.stringify(productDb));
  document.getElementById('btn-save-db').style.display='none';
  document.getElementById('fill-source').innerHTML='<span class="db-badge">📦 ローカルDB</span>';
  showStatus('✅ 保存しました。次回は自動入力されます。','success');
  setTimeout(hideStatus,3000);
}

// ============================================================
// Calculate
// ============================================================
function calculate(){
  const price=parseFloat(document.getElementById('price').value);
  const rolls=parseFloat(document.getElementById('rolls').value);
  const length=parseFloat(document.getElementById('length').value);
  const name=document.getElementById('product-name').value||'不明な商品';
  const type=document.getElementById('paper-type').value;
  const barcode=document.getElementById('barcode-input').value;
  if(!price||!rolls||!length){ showStatus('価格・ロール数・1ロールの長さを入力してください','error'); setTimeout(hideStatus,3000); return; }
  const totalLength=rolls*length, unitPrice=price/totalLength;
  const card=document.getElementById('result-card');
  card.style.display='none'; card.offsetHeight; card.style.display='block';
  document.getElementById('res-barcode').textContent=barcode?`JAN: ${barcode}`:'JAN: スキャンなし';
  document.getElementById('res-name').textContent=`${name}　${type}　${rolls}ロール`;
  document.getElementById('res-unit-price').textContent=unitPrice.toFixed(2);
  document.getElementById('res-price').textContent=`¥${price}`;
  document.getElementById('res-total').textContent=`${totalLength}m`;
  document.getElementById('res-type').textContent=type;
  document.getElementById('res-barcode-display').textContent=barcode?barcode.split('').join(' '):'— バーコードなし —';
  card.scrollIntoView({behavior:'smooth',block:'nearest'});
  hideStatus();
  const entry={id:Date.now(),barcode,name,price,rolls,length,totalLength,unitPrice,type,date:new Date().toLocaleDateString('ja-JP')};
  history.unshift(entry); if(history.length>20)history.pop();
  localStorage.setItem('tp_history',JSON.stringify(history));
  renderHistory();
}

// ============================================================
// History
// ============================================================
function renderHistory(){
  const list=document.getElementById('history-list');
  if(!history.length){list.innerHTML='<div class="history-empty">まだ記録がありません</div>';return;}
  list.innerHTML=history.map(h=>`
    <div class="history-item" onclick="loadHistory(${h.id})">
      <div><div class="name">${h.name} (${h.type})</div>
      <div class="sub">${h.rolls}R × ${h.length}m = ${h.totalLength}m　¥${h.price}　${h.date}</div></div>
      <div class="price">${h.unitPrice.toFixed(2)}円/m</div>
    </div>`).join('');
}
function loadHistory(id){
  const h=history.find(x=>x.id===id); if(!h)return;
  clearFillMarkers();
  document.getElementById('barcode-input').value=h.barcode||'';
  document.getElementById('price').value=h.price;
  setField('rolls',String(h.rolls),null); setField('length',String(h.length),null);
  setField('product-name',h.name,null); setSelectField('paper-type',h.type,null);
  calculate();
}
function clearHistory(){
  if(!history.length)return;
  if(confirm('履歴をすべて削除しますか？')){
    history=[]; localStorage.setItem('tp_history','[]'); renderHistory();
    document.getElementById('result-card').style.display='none';
  }
}

// ============================================================
// Status
// ============================================================
function showStatus(html,type){ const el=document.getElementById('status'); el.innerHTML=html; el.className=type||''; el.style.display='block'; }
function hideStatus(){ document.getElementById('status').style.display='none'; }
</script>
</body>
</html>
